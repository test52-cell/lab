<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영재 탐구 산출물 아카이브</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#172033;
      --card:#ffffff;
      --text:#0f172a;
      --sub:#475569;
      --line:#dbe3ee;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --soft:#eff6ff;
      --sky1:#08101f;
      --sky2:#111c31;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:linear-gradient(160deg, var(--bg1), var(--bg2));
      color:#111827;
      line-height:1.7;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    .hero{
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.16);
      border-radius:28px;
      padding:32px 24px;
      color:#ffffff;
      box-shadow:0 20px 40px rgba(0,0,0,0.18);
    }

    .hero h1{
      margin:0 0 12px;
      font-size:clamp(2rem, 4vw, 3.4rem);
      line-height:1.2;
      letter-spacing:-0.03em;
    }

    .hero p{
      margin:0;
      font-size:clamp(1.05rem, 2vw, 1.35rem);
      color:rgba(255,255,255,0.9);
    }

    .section-title{
      margin:34px 4px 18px;
      color:#ffffff;
      font-size:clamp(1.4rem, 2.5vw, 2rem);
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border-radius:24px;
      padding:24px;
      box-shadow:0 18px 40px rgba(15,23,42,0.18);
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .preview{
      position:relative;
      width:100%;
      min-height:290px;
      border-radius:22px;
      margin-bottom:20px;
      overflow:hidden;
      background:linear-gradient(180deg, var(--sky2), var(--sky1));
      border:1px solid #1e293b;
      box-shadow: inset 0 -20px 50px rgba(0,0,0,0.25);
      touch-action:none;
      user-select:none;
      cursor:grab;
    }

    .preview.dragging{
      cursor:grabbing;
    }

    canvas{
      display:block;
      width:100%;
      height:290px;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      pointer-events:none;
      padding:14px;
    }

    .guide-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .badge{
      background:rgba(255,255,255,0.12);
      color:#eef4ff;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:14px;
      padding:8px 12px;
      font-size:clamp(0.95rem, 1.8vw, 1.05rem);
      font-weight:800;
      backdrop-filter:blur(2px);
    }

    .phase-label{
      align-self:center;
      text-align:center;
      max-width:90%;
      background:rgba(255,255,255,0.1);
      color:#e5eefc;
      font-size:clamp(1rem, 2vw, 1.15rem);
      font-weight:800;
      border-radius:14px;
      padding:10px 14px;
      backdrop-filter:blur(2px);
      margin-bottom:54px;
    }

    .preview-controls{
      position:absolute;
      left:14px;
      right:14px;
      bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .mini-info{
      color:#dbeafe;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:14px;
      padding:8px 12px;
      font-size:clamp(0.92rem, 1.8vw, 1rem);
      font-weight:700;
      pointer-events:none;
    }

    .reset-btn{
      pointer-events:auto;
      border:0;
      border-radius:14px;
      padding:10px 14px;
      background:#ffffff;
      color:var(--accent2);
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,0.18);
    }

    .reset-btn:hover{
      transform:translateY(-1px);
    }

    .card h2{
      margin:0 0 8px;
      color:var(--text);
      font-size:clamp(1.5rem, 2.4vw, 2rem);
      line-height:1.3;
      letter-spacing:-0.02em;
    }

    .tag{
      display:inline-block;
      align-self:flex-start;
      margin-bottom:18px;
      padding:7px 12px;
      border-radius:999px;
      background:var(--soft);
      color:var(--accent2);
      font-size:1rem;
      font-weight:800;
    }

    .item{
      padding:14px 0;
      border-top:1px solid var(--line);
    }

    .item:first-of-type{
      border-top:0;
      padding-top:0;
    }

    .label{
      display:block;
      margin-bottom:6px;
      font-size:1.04rem;
      font-weight:800;
      color:var(--accent2);
    }

    .item p{
      margin:0;
      color:var(--sub);
      font-size:1.08rem;
    }

    .spacer{
      flex:1;
      min-height:12px;
    }

    .btn{
      display:inline-block;
      text-align:center;
      text-decoration:none;
      margin-top:18px;
      padding:14px 18px;
      border-radius:16px;
      background:linear-gradient(180deg, var(--accent), var(--accent2));
      color:#ffffff;
      font-size:1.08rem;
      font-weight:800;
      box-shadow:0 10px 20px rgba(37,99,235,0.28);
      transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 24px rgba(37,99,235,0.34);
    }

    .btn:active{
      transform:translateY(0);
      opacity:0.96;
    }

    .footer{
      margin-top:26px;
      color:rgba(255,255,255,0.82);
      font-size:1rem;
      text-align
